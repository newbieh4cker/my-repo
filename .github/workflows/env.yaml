name: env
on:
  workflow_dispatch:
    inputs:
      env-name:
        type: environment
        default: test
        required: false
        description: env name
jobs:
  print:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env-name }}
    env:
      ENV: ${{ vars.ENV_NAME }}
      SECRET: ${{ secrets.SECRET_NAME }}
    steps:
      - run: echo "${ENV}"
      - run: echo "${SECRET:0:1} ${SECRET#?}"
