name: env
on:
  workflow_dispatch:
    inputs:
      env-name:
        type: environment
        default: test
        required: false
        description: env name
jobs:
  print:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env-name }}
    env:
      USERNAME: ${{ vars.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
    steps:
      - run: echo "${USERNAME}"
      - run: echo "${PASSWORD:0:1} ${PASSWORD#?}"
